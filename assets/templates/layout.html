    <script src="https://cdn.jsdelivr.net/npm/algoliasearch@5.52.1/dist/lite/builds/browser.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4.96.2/dist/instantsearch.production.min.js"></script>
    <script>
        $('#menu').click(() => {
            $('#boilerplate').toggleClass('expand');
        });
        $('#sitemap-title-1').click(() => {
            $('#sitemap-link-1').toggleClass('expand');
        });
        $('#sitemap-title-2').click(() => {
            $('#sitemap-link-2').toggleClass('expand');
        });
        $('#sitemap-title-3').click(() => {
            $('#sitemap-link-3').toggleClass('expand');
        });
        $('#back').click(() => {
            window.history.back();
        });
        $('#menu').click(() => {
            $('.content-unit').toggleClass('move');
            $('#copyright-info').toggleClass('move');
            $('#sitemap').toggleClass('fade');
        });
        function boilerplateClock() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const second = now.getSeconds();
            document.getElementById('boiler-clock-hour').textContent = hour.toString().padStart(2, '0');
            document.getElementById('boiler-clock-minute').textContent = minute.toString().padStart(2, '0');
            document.getElementById('boiler-clock-second').textContent = second.toString().padStart(2, '0');
        }
        setInterval(() => {
            boilerplateClock();
        }, 1000);

        // Algolia search
        const { liteClient: algoliasearch } = window["algoliasearch/lite"];
        const searchClient = algoliasearch(
            "KX9DZYTWEQ",
            "96c5fee5982c80cab33a0cb9f793ec7a"
        );
        const search = instantsearch({
            indexName: "my_crawler_pages",
            searchClient
        });
        search.addWidgets([
            instantsearch.widgets.searchBox({
                container: "#search",
            }),
            instantsearch.widgets.hits({
                container: "#hits",
                templates: {
                    item(hit) {
                        return `
                            <a href="${hit.url}">
                                <h3>${hit.title}</h3>
                                <p>${hit.content || "No results."}</p>
                            </a>
                        `;
                    }
                }
            })
        ]);

        search.on('render', () => {
            try {
                const query = search.mainIndex.getHelper().state.query || '';
                document.getElementById('hits').style.display = query.trim() ? 'block' : 'none';
            } catch (e) {
                // fallback: show hits
                document.getElementById('hits').style.display = 'block';
            }
        });

        search.start();
    </script>
</body>

</html>
