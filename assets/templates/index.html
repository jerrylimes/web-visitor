{% extends "page.html" %} {% block content %}

<div id="sky-backdrop"></div>

<style>
    /* styling for home page readability concerns */

    .counter-button,
    .counter-i,
    .counter-list {
        color: white;
    }
    
    #counter.expand {
        background-color: rgb(170, 198, 213);
    }

    .counter-button:hover {
        background-color: hsl(205, 40%, 55%);
    }

    #counter-buttons {
        opacity: 0;
        transition: all 0.2s;
    }

    #counter.expand #counter-buttons {
        opacity: 1;
    }

    #counter-buttons:hover {
        opacity: 1;
    }

    .content-unit {
        margin-top: 0;
        height: 100vh;
    }
</style>

<div class="content-unit">
    <div id="sky-layout">
        <div class="sky-card">
            <div id="my-signature">
                <img id="my-logo" src="https://media.jerryly.cn/home-square-dark.svg" />
                <img id="my-sign" src="https://media.jerryly.cn/May-20-2026-signature.svg" />
            </div>
            <div id="sky-bottom-block">
                <span class="text-n sky-card-title">李江源</span>
                <span class="text-n sky-card-text">
                    <a class="sky-email" href="mailto:jerrylimee@icloud.com">jerrylimee@icloud.com</a>
                </span>
            </div>
            <button id="sky-flip-card">
                <span class="material-symbols-outlined">more_horiz</span>
            </button>
        </div>
        <div class="sky-card sky-more">
            <ul>
                <a href="https://jerryly.cn/pages/gallery.html">
                    <li>
                        <span class="material-symbols-outlined">
                            gallery_thumbnail
                        </span>
                        Gallery
                    </li>
                </a>
                <a href="https://jerryly.cn/pages/resume.html">
                    <li>
                        <span class="material-symbols-outlined">
                            account_box
                        </span>
                        Resume
                    </li>
                </a>
                <a
                    href="https://raw.githubusercontent.com/jerrylimes/jerrylimes/refs/heads/main/Resume%20(Mar%2014%202026).pdf">
                    <li>
                        <span class="material-symbols-outlined">
                            account_box
                        </span>
                        Resume (PDF)
                    </li>
                </a>
                <a href="../pages/contacts.html">
                    <li>
                        <span class="material-symbols-outlined">
                            headset_mic
                        </span>
                        Contacts
                    </li>
                </a>
            </ul>
        </div>
    </div>
</div>

<script>
    $("#sky-flip-card").click(() => {
        $("#sky-layout").toggleClass("gap-enable");
        $(".sky-more").toggleClass("show");
    });
</script>

{% endblock %}
